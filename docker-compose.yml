services:
  postgres:
    image: postgres:16-alpine
    container_name: ponchocapital-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ponchocapital_wm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ponchocapital_postgres_data:/var/lib/postgresql/data

volumes:
  ponchocapital_postgres_data:
